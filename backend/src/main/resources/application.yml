spring:
  application:
    name: signagetv-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/signagetv?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      file-size-threshold: 2MB

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key-min-32-bytes-long}
    expiration-hours: 24
  storage:
    path: ${STORAGE_PATH:/var/signagetv/media}
  public-base-url: ${PUBLIC_BASE_URL:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    root: INFO
    com.signagetv: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
