# SignageTV — despliegue en VPS
# Asume MySQL ya instalado en el host (puerto 3306).
# El contenedor backend lo alcanza vía host.docker.internal (extra_hosts).

services:
  backend:
    build:
      context: ./backend
    container_name: signagetv-backend
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PATH: /var/signagetv/media
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/var/signagetv/media
    networks:
      - signagenet

  admin:
    build:
      context: ./admin-panel
    container_name: signagetv-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - signagenet

  nginx:
    image: public.ecr.aws/nginx/nginx:alpine
    container_name: signagetv-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8082}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
    networks:
      - signagenet

volumes:
  media_data:

networks:
  signagenet:
    driver: bridge
