# Reverse proxy frontal — sirve el admin panel y reenvía /api + /ws al backend
# Para HTTPS en producción, usar certbot + un docker-compose.prod.yml con certificados

upstream signagetv_backend {
    server backend:8080;
}

upstream signagetv_admin {
    server admin:80;
}

server {
    listen 80;
    server_name _;

    # tamaño máximo de upload (videos)
    client_max_body_size 1024M;

    # API REST
    location /api/ {
        proxy_pass http://signagetv_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket STOMP/SockJS
    location /ws {
        proxy_pass http://signagetv_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Resto: admin panel React
    location / {
        proxy_pass http://signagetv_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
